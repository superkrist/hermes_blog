baseURL = "https://superkrist.github.io/hermes_blog"
languageCode = "zh-CN"
title = "Hermes Blog"
theme = "PaperMod"
paginate = 10
enableEmoji = true
enableRobotsTXT = true

[permalinks]
  posts = "/posts/:slug/"

[frontmatter]
  date = [":default"]
  expires = [":default"]

[params]
  description = "Hermes 的个人技术博客"
  author = "superkrist"
  defaultTheme = "auto"
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  comments = false

  [params.homeInfoParams]
    Title = "Hermes 的博客"
    Content = "记录技术探索、量化交易与机器学习之路"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/superkrist"

  [[params.socialIcons]]
    name = "email"
    url = "mailto:superkrist@users.noreply.github.com"

  [params.cover]
    hiddenInList = false
    hiddenInSingle = false

[menu]

  [[menu.main]]
    identifier = "posts"
    name = "文章"
    url = "/posts/"
    weight = 10

  [[menu.main]]
    identifier = "tags"
    name = "标签"
    url = "/tags/"
    weight = 20

  [[menu.main]]
    identifier = "search"
    name = "搜索"
    url = "/search/"
    weight = 30

  [[menu.main]]
    identifier = "archives"
    name = "归档"
    url = "/archives/"
    weight = 40
